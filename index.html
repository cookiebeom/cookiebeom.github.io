    * { box-sizing: border-box; }
    :root {

      --line: #dfe8df;

    body {

    .brand-bar {

      padding: 24px 28px 30px;
    }
    .header-inner, main {

      margin: 0 auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--linlee-mint);
      color: var(--linlee-forest);
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: inset 0 -4px 0 rgba(97, 177, 90, .24);
    }
    .brand-text {
      display: grid;
      gap: 2px;
    }
    .brand-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .brand-sub {
      font-size: 12px;
      color: #c8dccf;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.22;
      font-weight: 720;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0;
      max-width: 820px;
      color: #dcebe0;
      font-size: 14px;
      line-height: 1.7;
    }
    main {
      padding: 20px 22px 28px;
    }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: -38px 0 14px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      min-height: 82px;
    }
    .metric .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
    }
    .metric .value {
      font-size: 24px;
      line-height: 1;
      font-weight: 720;
      color: var(--linlee-forest);
    }
    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .filters {
      display: grid;
      grid-template-columns: 1.5fr repeat(4, 1fr);
      gap: 10px;
    }
    input, select {
      width: 100%;
      border: 1px solid #cfdccf;
      border-radius: 6px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      outline: none;
    }
    input:focus, select:focus {

    }

      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }
    .range-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .range-btn, .reset {
      border: 1px solid #cfdccf;
      border-radius: 999px;
      background: #fff;
      color: var(--linlee-forest);
      padding: 7px 11px;
      cursor: pointer;
      font-size: 13px;
    }
    .range-btn.active {
      border-color: var(--linlee-green);
      background: var(--linlee-mint);
      color: var(--linlee-green);
      font-weight: 700;
    }
    .reset {
      border-radius: 6px;
      background: var(--linlee-mint);
      color: var(--linlee-green);
      border-color: transparent;

    .toggle {

      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      user-select: none;

      height: 16px;
      accent-color: var(--linlee-green);

      overflow: hidden;
      box-shadow: var(--shadow);

      border-collapse: collapse;

      padding: 12px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.55;

      color: #425047;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }

      text-decoration: none;
      font-weight: 520;

      text-decoration: underline;

      font-weight: 560;
    }
    details summary {
      cursor: pointer;
      list-style: none;
    }

      display: none;

      margin-top: 9px;
      color: var(--muted);
      font-weight: 400;
      background: #f7faf5;
      border: 1px solid #e4ece3;
      border-radius: 6px;
      padding: 9px 10px;
    }
    .detail a {
      word-break: break-all;
    }
    .tag {
      display: inline-block;
      margin: 0 4px 4px 0;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--linlee-mint);
      color: var(--linlee-green);
      white-space: nowrap;
      font-size: 12px;
      font-weight: 600;
    }
    .rel {
      display: inline-block;
      min-width: 34px;
      text-align: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 700;
      font-size: 12px;

    .rel-high { color: var(--danger); background: #fff0ed; }
    .rel-mid { color: var(--warning); background: #fff6e8; }
    .rel-low { color: var(--muted); background: #f2f4f0; }
    .empty {
      display: none;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-top: 14px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }
    footer {
      color: #7c887f;
      font-size: 12px;
      margin-top: 14px;
      line-height: 1.8;
    }

      .table-wrap { overflow-x: auto; }
      table { min-width: 920px; }

  <script>
    const data = JSON.parse(document.getElementById('data').textContent);
    const q = document.getElementById('q');
    const theme = document.getElementById('theme');
    const relevance = document.getElementById('relevance');
    const source = document.getElementById('source');
    const contentType = document.getElementById('content-type');
    const rows = document.getElementById('rows');
    const empty = document.getElementById('empty');
    const reset = document.getElementById('reset');
    const showLow = document.getElementById('show-low');
    const rangeButtons = [...document.querySelectorAll('.range-btn')];
    const statCount = document.getElementById('stat-count');
    const statHigh = document.getElementById('stat-high');
    const statMid = document.getElementById('stat-mid');
    let activeRange = 'all';

    const uniq = arr => [...new Set(arr.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    const esc = s => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[c]));
    const relClass = value => value === '高' ? 'rel-high' : value === '中' ? 'rel-mid' : 'rel-low';

    for (const value of uniq(data.flatMap(item => item.themes || []))) theme.add(new Option(value, value));
    for (const value of uniq(data.map(item => item.source))) source.add(new Option(value, value));
    for (const value of uniq(data.map(item => item.content_type))) contentType.add(new Option(value, value));

    function inDateRange(item) {
      if (activeRange === 'all') return true;
      if (!item.published_at) return false;
      const published = new Date(item.published_at + 'T00:00:00');
      if (Number.isNaN(published.getTime())) return false;
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (activeRange === 'month') {
        return published.getFullYear() === today.getFullYear() && published.getMonth() === today.getMonth();
      }
      const days = Number(activeRange);
      const start = new Date(today);
      start.setDate(start.getDate() - days + 1);
      return published >= start && published <= today;
    }

    function matches(item) {
      const kw = q.value.trim().toLowerCase();
      const text = [item.title, item.source, ...(item.themes || [])].join(' ').toLowerCase();
      const lowOrNoise = item.relevance === '低' || ['企业备案类', '新闻动态类', '其他'].includes(item.content_type);
      return (!kw || text.includes(kw))
        && (!theme.value || (item.themes || []).includes(theme.value))
        && (!relevance.value || item.relevance === relevance.value)
        && (!source.value || item.source === source.value)
        && (!contentType.value || item.content_type === contentType.value)
        && (showLow.checked || !lowOrNoise)
        && inDateRange(item);
    }

    function render() {
      const filtered = data.filter(matches).sort((a, b) => {
        const dateCompare = String(b.sort_date || '').localeCompare(String(a.sort_date || ''));
        if (dateCompare !== 0) return dateCompare;
        return String(a.title || '').localeCompare(String(b.title || ''), 'zh-CN');
      });
      rows.innerHTML = filtered.map(item => `
        <tr>
          <td>${esc(item.display_date || item.published_at || '未标注')}</td>
          <td>${(item.themes || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td>
          <td><span class="rel ${relClass(item.relevance)}">${esc(item.relevance || '未分级')}</span></td>
          <td>${esc(item.content_type || '未识别')}</td>
          <td class="title-cell">
            <details>
              <summary>${esc(item.title)}</summary>
              <div class="detail">
                <div>来源：${esc(item.source)}</div>
                <div>发布日期：${esc(item.display_date || item.published_at || '未标注')}</div>
                <div>主题：${(item.themes || []).map(esc).join('、') || '未分类'}</div>
                <div>内容类型：${esc(item.content_type || '未识别')}</div>
                <div>原文：<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.url)}</a></div>
              </div>
            </details>
          </td>
          <td>${esc(item.source)}</td>
        </tr>
      `).join('');
      statCount.textContent = filtered.length;
      statHigh.textContent = filtered.filter(item => item.relevance === '高').length;
      statMid.textContent = filtered.filter(item => item.relevance === '中').length;
      empty.style.display = filtered.length ? 'none' : 'block';
    }

    reset.addEventListener('click', () => {
      q.value = '';
      theme.value = '';
      relevance.value = '';
      source.value = '';
      contentType.value = '';
      showLow.checked = false;
      activeRange = 'all';
      rangeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.range === activeRange));
      render();
    });
    rangeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        activeRange = btn.dataset.range;
        rangeButtons.forEach(item => item.classList.toggle('active', item === btn));
        render();
      });
    });
    [q, theme, relevance, source, contentType, showLow].forEach(el => el.addEventListener('input', render));
    render();
  </script>
</body>
</html>
