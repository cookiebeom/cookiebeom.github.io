<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>林里法务法规动态历史回查</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --linlee-forest: #12372a;
      --linlee-green: #1f7a4d;
      --linlee-leaf: #61b15a;
      --linlee-tea: #d9a441;
      --linlee-cream: #fbfaf2;
      --linlee-mint: #eef7ee;
      --ink: #202620;
      --muted: #66726b;
      --line: #dfe8df;
      --panel: #ffffff;
      --danger: #b42318;
      --warning: #b54708;
      --shadow: 0 10px 28px rgba(18, 55, 42, .08);
    }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, var(--linlee-cream) 0%, #f4f7f3 42%, #f7f8f5 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    .brand-bar {
      height: 8px;
      background: linear-gradient(90deg, var(--linlee-forest), var(--linlee-green) 48%, var(--linlee-tea));
    }
    header {
      background: var(--linlee-forest);
      color: #fff;
      padding: 24px 28px 30px;
    }
    .header-inner, main {
      max-width: 1180px;
      margin: 0 auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--linlee-mint);
      color: var(--linlee-forest);
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: inset 0 -4px 0 rgba(97, 177, 90, .24);
    }
    .brand-text {
      display: grid;
      gap: 2px;
    }
    .brand-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .brand-sub {
      font-size: 12px;
      color: #c8dccf;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.22;
      font-weight: 720;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0;
      max-width: 820px;
      color: #dcebe0;
      font-size: 14px;
      line-height: 1.7;
    }
    main {
      padding: 20px 22px 28px;
    }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: -38px 0 14px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      min-height: 82px;
    }
    .metric .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
    }
    .metric .value {
      font-size: 24px;
      line-height: 1;
      font-weight: 720;
      color: var(--linlee-forest);
    }
    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .filters {
      display: grid;
      grid-template-columns: 1.5fr repeat(4, 1fr);
      gap: 10px;
    }
    input, select {
      width: 100%;
      border: 1px solid #cfdccf;
      border-radius: 6px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--linlee-green);
      box-shadow: 0 0 0 3px rgba(31, 122, 77, .14);
    }
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }
    .range-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .range-btn, .reset {
      border: 1px solid #cfdccf;
      border-radius: 999px;
      background: #fff;
      color: var(--linlee-forest);
      padding: 7px 11px;
      cursor: pointer;
      font-size: 13px;
    }
    .range-btn.active {
      border-color: var(--linlee-green);
      background: var(--linlee-mint);
      color: var(--linlee-green);
      font-weight: 700;
    }
    .reset {
      border-radius: 6px;
      background: var(--linlee-mint);
      color: var(--linlee-green);
      border-color: transparent;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      user-select: none;
    }
    .toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--linlee-green);
    }
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border-bottom: 1px solid #e9efe8;
      padding: 12px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.55;
    }
    th {
      background: #f2f7f1;
      color: #425047;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr:hover td {
      background: #fbfdf9;
    }
    a {
      color: var(--linlee-green);
      text-decoration: none;
      font-weight: 520;
    }
    a:hover {
      text-decoration: underline;
    }
    .title-cell {
      min-width: 360px;
      font-weight: 560;
    }
    details summary {
      cursor: pointer;
      list-style: none;
    }
    details summary::-webkit-details-marker {
      display: none;
    }
    .detail {
      margin-top: 9px;
      color: var(--muted);
      font-weight: 400;
      background: #f7faf5;
      border: 1px solid #e4ece3;
      border-radius: 6px;
      padding: 9px 10px;
    }
    .detail a {
      word-break: break-all;
    }
    .tag {
      display: inline-block;
      margin: 0 4px 4px 0;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--linlee-mint);
      color: var(--linlee-green);
      white-space: nowrap;
      font-size: 12px;
      font-weight: 600;
    }
    .rel {
      display: inline-block;
      min-width: 34px;
      text-align: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 700;
      font-size: 12px;
    }
    .rel-high { color: var(--danger); background: #fff0ed; }
    .rel-mid { color: var(--warning); background: #fff6e8; }
    .rel-low { color: var(--muted); background: #f2f4f0; }
    .empty {
      display: none;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-top: 14px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }
    footer {
      color: #7c887f;
      font-size: 12px;
      margin-top: 14px;
      line-height: 1.8;
    }
    @media (max-width: 900px) {
      header { padding: 20px 16px 58px; }
      main { padding: 14px; }
      .summary-strip { grid-template-columns: repeat(2, 1fr); }
      .filters { grid-template-columns: 1fr; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 920px; }
    }
  </style>
</head>
<body>
  <div class="brand-bar"></div>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">林</div>
        <div class="brand-text">
          <div class="brand-name">LINLEE 林里</div>
          <div class="brand-sub">Legal Ops Monitor</div>
        </div>
      </div>
      <h1>法规动态历史回查</h1>
      <p class="subtitle">仅收录 2026 年公开法规动态记录，支持按主题、来源、相关性和内容类型快速回查。最后更新：2026-07-22 09:30</p>
    </div>
  </header>

  <main>
    <section class="summary-strip">
      <div class="metric"><div class="label">当前筛选结果</div><div class="value" id="stat-count">0</div></div>
      <div class="metric"><div class="label">高相关</div><div class="value" id="stat-high">0</div></div>
      <div class="metric"><div class="label">中相关</div><div class="value" id="stat-mid">0</div></div>
      <div class="metric"><div class="label">年度范围</div><div class="value">2026</div></div>
    </section>

    <section class="toolbar">
      <div class="filters">
        <input id="q" type="search" placeholder="搜索标题、来源或主题">
        <select id="theme"><option value="">全部主题</option></select>
        <select id="relevance"><option value="">全部相关性</option><option>高</option><option>中</option><option>低</option></select>
        <select id="source"><option value="">全部来源</option></select>
        <select id="content-type"><option value="">全部类型</option></select>
      </div>
      <div class="meta-row">
        <div class="range-buttons" aria-label="日期快捷筛选">
          <button class="range-btn active" type="button" data-range="all">2026 全年</button>
          <button class="range-btn" type="button" data-range="7">近 7 日</button>
          <button class="range-btn" type="button" data-range="30">近 30 日</button>
          <button class="range-btn" type="button" data-range="month">本月</button>
        </div>
        <label class="toggle"><input id="show-low" type="checkbox">显示低相关 / 非法规类</label>
        <button class="reset" id="reset" type="button">清空筛选</button>
      </div>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:110px">发布日期</th>
            <th style="width:210px">主题</th>
            <th style="width:86px">相关性</th>
            <th style="width:110px">内容类型</th>
            <th>标题</th>
            <th style="width:190px">来源</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
    <div id="empty" class="empty">没有符合筛选条件的 2026 年记录</div>
    <footer>
      <div>说明：本页仅展示公开法规索引字段，不包含系统密钥、内部协作信息或法律意见结论。</div>
      <div>是否需要调整制度、模板或通知业务，请以法务专业判断为准。</div>
    </footer>
  </main>

24", "url": "http://www.nhc.gov.cn", "themes": ["食品安全"], "relevance": "高", "content_type": "其他"}, {"title": "京ICP备20024162号", "source_id": "cfsa", "source": "国家食品安全风险评估中心", "published_at": "", "display_date": "2026-06-24", "sort_date": "2026-06-24", "url": "https://beian.miit.gov.cn/", "themes": [], "relevance": "低", "content_type": "其他"}, {"title": "政府信息公开", "source_id": "samr_regulations", "source": "市监总局-法规司", "published_at": "", "display_date": "2026-06-24", "sort_date": "2026-06-24", "url": "https://www.samr.gov.cn/zw/zfxxgk/index.html", "themes": [], "relevance": "低", "content_type": "其他"}]</script>
  <script>
    const data = JSON.parse(document.getElementById('data').textContent);
    const q = document.getElementById('q');
    const theme = document.getElementById('theme');
    const relevance = document.getElementById('relevance');
    const source = document.getElementById('source');
    const contentType = document.getElementById('content-type');
    const rows = document.getElementById('rows');
    const empty = document.getElementById('empty');
    const reset = document.getElementById('reset');
    const showLow = document.getElementById('show-low');
    const rangeButtons = [...document.querySelectorAll('.range-btn')];
    const statCount = document.getElementById('stat-count');
    const statHigh = document.getElementById('stat-high');
    const statMid = document.getElementById('stat-mid');
    let activeRange = 'all';

    const uniq = arr => [...new Set(arr.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    const esc = s => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[c]));
    const relClass = value => value === '高' ? 'rel-high' : value === '中' ? 'rel-mid' : 'rel-low';

    for (const value of uniq(data.flatMap(item => item.themes || []))) theme.add(new Option(value, value));
    for (const value of uniq(data.map(item => item.source))) source.add(new Option(value, value));
    for (const value of uniq(data.map(item => item.content_type))) contentType.add(new Option(value, value));

    function inDateRange(item) {
      if (activeRange === 'all') return true;
      if (!item.published_at) return false;
      const published = new Date(item.published_at + 'T00:00:00');
      if (Number.isNaN(published.getTime())) return false;
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (activeRange === 'month') {
        return published.getFullYear() === today.getFullYear() && published.getMonth() === today.getMonth();
      }
      const days = Number(activeRange);
      const start = new Date(today);
      start.setDate(start.getDate() - days + 1);
      return published >= start && published <= today;
    }

    function matches(item) {
      const kw = q.value.trim().toLowerCase();
      const text = [item.title, item.source, ...(item.themes || [])].join(' ').toLowerCase();
      const lowOrNoise = item.relevance === '低' || ['企业备案类', '新闻动态类', '其他'].includes(item.content_type);
      return (!kw || text.includes(kw))
        && (!theme.value || (item.themes || []).includes(theme.value))
        && (!relevance.value || item.relevance === relevance.value)
        && (!source.value || item.source === source.value)
        && (!contentType.value || item.content_type === contentType.value)
        && (showLow.checked || !lowOrNoise)
        && inDateRange(item);
    }

    function render() {
      const filtered = data.filter(matches).sort((a, b) => {
        const dateCompare = String(b.sort_date || '').localeCompare(String(a.sort_date || ''));
        if (dateCompare !== 0) return dateCompare;
        return String(a.title || '').localeCompare(String(b.title || ''), 'zh-CN');
      });
      rows.innerHTML = filtered.map(item => `
        <tr>
          <td>${esc(item.display_date || item.published_at || '未标注')}</td>
          <td>${(item.themes || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td>
          <td><span class="rel ${relClass(item.relevance)}">${esc(item.relevance || '未分级')}</span></td>
          <td>${esc(item.content_type || '未识别')}</td>
          <td class="title-cell">
            <details>
              <summary>${esc(item.title)}</summary>
              <div class="detail">
                <div>来源：${esc(item.source)}</div>
                <div>发布日期：${esc(item.display_date || item.published_at || '未标注')}</div>
                <div>主题：${(item.themes || []).map(esc).join('、') || '未分类'}</div>
                <div>内容类型：${esc(item.content_type || '未识别')}</div>
                <div>原文：<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.url)}</a></div>
              </div>
            </details>
          </td>
          <td>${esc(item.source)}</td>
        </tr>
      `).join('');
      statCount.textContent = filtered.length;
      statHigh.textContent = filtered.filter(item => item.relevance === '高').length;
      statMid.textContent = filtered.filter(item => item.relevance === '中').length;
      empty.style.display = filtered.length ? 'none' : 'block';
    }

    reset.addEventListener('click', () => {
      q.value = '';
      theme.value = '';
      relevance.value = '';
      source.value = '';
      contentType.value = '';
      showLow.checked = false;
      activeRange = 'all';
      rangeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.range === activeRange));
      render();
    });
    rangeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        activeRange = btn.dataset.range;
        rangeButtons.forEach(item => item.classList.toggle('active', item === btn));
        render();
      });
    });
    [q, theme, relevance, source, contentType, showLow].forEach(el => el.addEventListener('input', render));
    render();
  </script>
