;中&quot;}, {&quot;title&quot;: &quot;对外使用国徽图案的办法&quot;, &quot;source&quot;: &quot;中国政府网-国务院政策最新&quot;, &quot;published_at&quot;: &quot;2025-11-14&quot;, &quot;url&quot;: &quot;https://www.gov.cn/zhengce/content/202511/content_7048576.htm&quot;, &quot;themes&quot;: [], &quot;relevance&quot;: &quot;低&quot;}, {&quot;title&quot;: &quot;国家知识产权局关于修改《专利审查指南》的决定（局令第84号）&quot;, &quot;source&quot;: &quot;国家知识产权局-政策文件&quot;, &quot;published_at&quot;: &quot;2025-11-13&quot;, &quot;url&quot;: &quot;https://www.cnipa.gov.cn/art/2025/11/13/art_99_202568.html&quot;, &quot;themes&quot;: [&quot;知识产权&quot;], &quot;relevance&quot;: &quot;高&quot;}]</script>
  <script>
    const data = JSON.parse(document.getElementById('data').textContent);
    const q = document.getElementById('q');
    const theme = document.getElementById('theme');
    const relevance = document.getElementById('relevance');
    const source = document.getElementById('source');
    const rows = document.getElementById('rows');
    const count = document.getElementById('count');
    const empty = document.getElementById('empty');
    const uniq = arr => [...new Set(arr.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    for (const value of uniq(data.flatMap(item => item.themes || []))) theme.add(new Option(value, value));
    for (const value of uniq(data.map(item => item.source))) source.add(new Option(value, value));
    function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function render() {
      const kw = q.value.trim().toLowerCase();
      const filtered = data.filter(item => {
        const text = [item.title, item.source, ...(item.themes || [])].join(' ').toLowerCase();
        return (!kw || text.includes(kw)) && (!theme.value || (item.themes || []).includes(theme.value)) && (!relevance.value || item.relevance === relevance.value) && (!source.value || item.source === source.value);
      });
      rows.innerHTML = filtered.map(item => `<tr><td>${esc(item.published_at)}</td><td>${(item.themes || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td><td class="rel-${esc(item.relevance)}">${esc(item.relevance)}</td><td><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a></td><td>${esc(item.source)}</td></tr>`).join('');
      count.textContent = `${filtered.length} ???`;
      empty.style.display = filtered.length ? 'none' : 'block';
    }
    [q, theme, relevance, source].forEach(el => el.addEventListener('input', render));
    render();
  </script>
