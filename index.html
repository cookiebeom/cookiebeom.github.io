<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>法规动态历史归档</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #e6eaf0;
      --text: #1f2329;
      --muted: #667085;
      --blue: #245bdb;
      --blue-soft: #eef4ff;
      --green: #067647;
      --orange: #b54708;
      --red: #b42318;
      --shadow: 0 8px 24px rgba(31, 35, 41, .07);
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      background: #17324f;
      color: #fff;
      padding: 28px 32px 30px;
    }
    .header-inner {
      max-width: 1180px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.25;
      font-weight: 650;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0;
      color: #d6e3f3;
      font-size: 14px;
      line-height: 1.7;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .stat .value {
      font-size: 22px;
      font-weight: 650;
    }
    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .filters {
      display: grid;
      grid-template-columns: 1.5fr repeat(4, 1fr);
      gap: 10px;
    }
    input, select {
      width: 100%;
      border: 1px solid #d8dee8;
      border-radius: 6px;
      padding: 10px 11px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(36, 91, 219, .12);
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }
    .quick-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .range-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .range-btn {
      border: 1px solid #d8dee8;
      border-radius: 999px;
      background: #fff;
      color: #344054;
      padding: 7px 11px;
      cursor: pointer;
      font-size: 13px;
    }
    .range-btn.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 600;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #344054;
      font-size: 13px;
      user-select: none;
    }
    .toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--blue);
    }
    .reset {
      border: 0;
      border-radius: 6px;
      background: var(--blue-soft);
      color: var(--blue);
      padding: 7px 10px;
      cursor: pointer;
    }
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border-bottom: 1px solid #edf0f5;
      padding: 12px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.55;
    }
    th {
      background: #f7f9fc;
      color: #4e5969;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr:hover td {
      background: #fbfcff;
    }
    a {
      color: var(--blue);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .title-cell {
      min-width: 360px;
      font-weight: 520;
    }
    details summary {
      cursor: pointer;
      list-style: none;
    }
    details summary::-webkit-details-marker {
      display: none;
    }
    .detail {
      margin-top: 9px;
      color: var(--muted);
      font-weight: 400;
      background: #f7f9fc;
      border: 1px solid #edf0f5;
      border-radius: 6px;
      padding: 9px 10px;
    }
    .detail a {
      word-break: break-all;
    }
    .tag {
      display: inline-block;
      margin: 0 4px 4px 0;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      white-space: nowrap;
      font-size: 12px;
    }
    .rel {
      display: inline-block;
      min-width: 34px;
      text-align: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 600;
      font-size: 12px;
    }
    .rel-high { color: var(--red); background: #fff0ed; }
    .rel-mid { color: var(--orange); background: #fff6e8; }
    .rel-low { color: var(--muted); background: #f2f4f7; }
    .empty {
      display: none;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-top: 14px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }
    footer {
      color: #86909c;
      font-size: 12px;
      margin-top: 14px;
      line-height: 1.8;
    }
    @media (max-width: 900px) {
      header { padding: 22px 18px; }
      main { padding: 14px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .filters { grid-template-columns: 1fr; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 920px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>法规动态历史归档</h1>
      <p class="subtitle">公开演示版，仅保留法规标题、来源、发布时间、主题、相关性和原文链接。最后更新：2026-06-30 09:30</p>
    </div>
  </header>
  <main>
    <section class="stats">
      <div class="stat"><div class="label">当前筛选结果</div><div class="value" id="stat-count">0</div></div>
      <div class="stat"><div class="label">高相关</div><div class="value" id="stat-high">0</div></div>
      <div class="stat"><div class="label">中相关</div><div class="value" id="stat-mid">0</div></div>
      <div class="stat"><div class="label">低相关</div><div class="value" id="stat-low">0</div></div>
    </section>

    <section class="toolbar">
      <div class="filters">
        <input id="q" type="search" placeholder="搜索标题、来源或主题">
        <select id="theme"><option value="">全部主题</option></select>
        <select id="relevance"><option value="">全部相关性</option><option>高</option><option>中</option><option>低</option></select>
        <select id="source"><option value="">全部来源</option></select>
        <select id="content-type"><option value="">全部类型</option></select>
      </div>
      <div class="meta-row">
        <span>数据来自公开法规网站，按最近 500 条入库记录展示。</span>
        <button class="reset" id="reset" type="button">清空筛选</button>
      </div>
      <div class="quick-row">
        <div class="range-buttons" aria-label="日期快捷筛选">
          <button class="range-btn active" type="button" data-range="all">全部</button>
          <button class="range-btn" type="button" data-range="7">近7日</button>
          <button class="range-btn" type="button" data-range="30">近30日</button>
          <button class="range-btn" type="button" data-range="month">本月</button>
        </div>
        <label class="toggle"><input id="show-low" type="checkbox">显示低相关/非法规内容</label>
      </div>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:110px">发布时间</th>
            <th style="width:210px">主题</th>
            <th style="width:86px">相关性</th>
            <th style="width:110px">内容类型</th>
            <th>标题</th>
            <th style="width:190px">来源</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
    <div id="empty" class="empty">没有符合筛选条件的记录</div>
    <footer>
      <div>说明：本页面为公开演示版，仅展示公开法规索引字段，不包含系统密钥或内部协作信息。</div>
      <div>法规影响判断请以专业法律/合规意见为准。</div>
    </footer>
  </main>

    for (const value of uniq(data.flatMap(item => item.themes || []))) theme.add(new Option(value, value));
    for (const value of uniq(data.map(item => item.source))) source.add(new Option(value, value));
    for (const value of uniq(data.map(item => item.content_type))) contentType.add(new Option(value, value));

    function inDateRange(item) {
      if (activeRange === 'all') return true;
      if (!item.published_at) return false;
      const published = new Date(item.published_at + 'T00:00:00');
      if (Number.isNaN(published.getTime())) return false;
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (activeRange === 'month') {
        return published.getFullYear() === today.getFullYear() && published.getMonth() === today.getMonth();
      }
      const days = Number(activeRange);
      const start = new Date(today);
      start.setDate(start.getDate() - days + 1);
      return published >= start && published <= today;
    }

    function matches(item) {
      const kw = q.value.trim().toLowerCase();
      const text = [item.title, item.source, ...(item.themes || [])].join(' ').toLowerCase();
      if (!showLow.checked && (item.relevance === '低' || ['企业备案类', '新闻动态类', '其他'].includes(item.content_type))) return false;
      return (!kw || text.includes(kw))
        && (!theme.value || (item.themes || []).includes(theme.value))
        && (!relevance.value || item.relevance === relevance.value)
        && (!source.value || item.source === source.value)
        && (!contentType.value || item.content_type === contentType.value)
        && inDateRange(item);
    }

    function render() {
      const filtered = data.filter(matches).sort((a, b) => {
        const dateCompare = String(b.sort_date || '').localeCompare(String(a.sort_date || ''));
        if (dateCompare !== 0) return dateCompare;
        return String(a.title || '').localeCompare(String(b.title || ''), 'zh-CN');
      });
      rows.innerHTML = filtered.map(item => `
        <tr>
          <td>${esc(item.display_date || item.published_at || '未标注')}</td>
          <td>${(item.themes || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td>
          <td><span class="rel ${relClass(item.relevance)}">${esc(item.relevance || '未分级')}</span></td>
          <td>${esc(item.content_type || '未识别')}</td>
          <td class="title-cell">
            <details>
              <summary>${esc(item.title)}</summary>
              <div class="detail">
                <div>来源：${esc(item.source)}</div>
                <div>发布时间：${esc(item.display_date || item.published_at || '未标注')}</div>
                <div>主题：${(item.themes || []).map(esc).join('、') || '未分类'}</div>
                <div>内容类型：${esc(item.content_type || '未识别')}</div>
                <div>原文：<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.url)}</a></div>
              </div>
            </details>
          </td>
          <td>${esc(item.source)}</td>
        </tr>
      `).join('');
      statCount.textContent = filtered.length;
      statHigh.textContent = filtered.filter(item => item.relevance === '高').length;
      statMid.textContent = filtered.filter(item => item.relevance === '中').length;
      statLow.textContent = filtered.filter(item => item.relevance === '低').length;
      empty.style.display = filtered.length ? 'none' : 'block';
    }

    reset.addEventListener('click', () => {
      q.value = '';
      theme.value = '';
      relevance.value = '';
      source.value = '';
      contentType.value = '';
      showLow.checked = false;
      activeRange = 'all';
      rangeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.range === activeRange));
      render();
    });
    rangeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        activeRange = btn.dataset.range;
        rangeButtons.forEach(item => item.classList.toggle('active', item === btn));
        render();
      });
    });
    [q, theme, relevance, source, contentType, showLow].forEach(el => el.addEventListener('input', render));
    render();
  </script>
</body>
</html>
